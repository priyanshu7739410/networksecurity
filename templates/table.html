<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Security - Prediction Output</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .container {
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .card-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        .table-responsive {
            max-height: 600px;
            overflow-y: auto;
        }
        .table {
            margin-bottom: 0;
        }
        .btn-home {
            background-color: #1e3c72;
            color: white;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background-color: #2a5298;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0">Prediction Output Results</h3>
                <a href="/" class="btn btn-home btn-sm">Back to Home / Docs</a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    {{ table | safe }}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
